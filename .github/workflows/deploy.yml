name: Full Stack CI/CD

on:
  push:
    branches: [ "main" ]

jobs:

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build Angular app
        run: |
          cd frontend
          npm run build --prod

  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run backend (test check)
        run: |
          cd backend
          node -e "console.log('Backend OK')"

  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]

    steps:
      - name: Deploy Step
        run: echo "🚀 Deploying application..."