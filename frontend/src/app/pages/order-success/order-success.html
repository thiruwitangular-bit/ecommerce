<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
    <div class="bg-white shadow-lg rounded-2xl p-6 sm:p-10 max-w-md w-full text-center">

        <!-- ✅ Icon -->
        <div class="flex justify-center">
            <div class="bg-green-100 rounded-full p-4">
                <span class="material-icons text-green-600 text-4xl">check_circle</span>
            </div>
        </div>

        <!-- ✅ Title -->
        <h2 class="text-2xl font-bold text-gray-800 mt-4">
            Order Placed Successfully!
        </h2>

        <!-- ✅ Message -->
        <p class="text-gray-600 mt-2 text-sm">
            Thank you for your purchase. Your order has been placed successfully.
        </p>

        <!-- ✅ Order ID -->
        <p class="mt-3 text-sm text-gray-500">
            Order ID:
            <span class="font-semibold text-gray-800">
                {{ orderId }}
            </span>
        </p>

        <!-- ✅ Actions -->
        <div class="mt-6 flex flex-col gap-3">

            <button type="button" routerLink="/products" class="w-full bg-purple-700 hover:bg-purple-800 text-white py-2 rounded-md">
                Continue Shopping
            </button>

        </div>
    </div>
</div>
