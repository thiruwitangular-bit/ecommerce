<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="w-full max-w-md p-8 bg-white rounded shadow">
        <h2 class="text-2xl font-bold mb-6 text-center">Login with Phone</h2>

        <!-- Phone Input -->
        @if (!otpsent) {
        <form [formGroup]="phoneForm" (ngSubmit)="sendOTP()">
            <div class="mb-4">
                <label class="block text-gray-700 mb-1">Phone Number</label>
                <input formControlName="phone" type="text" class="w-full border p-2 rounded" />
            </div>
            @if (error) {
            <div class="text-red-500 mb-4">{{ error }}</div>
            }
            <button class="w-full bg-purple-700 hover:bg-purple-800 text-white p-2 rounded font-semibold">
                Send OTP
            </button>
        </form>
    }

        <!-- OTP Input -->
         @if (otpsent) {
        <form [formGroup]="otpForm" (ngSubmit)="verifyOTP()">
            <div class="mb-4">
                <label class="block text-gray-700 mb-1">Enter OTP</label>
                <input formControlName="otp" type="text" class="w-full border p-2 rounded" />
            </div>
            @if (error) {
            <div class="text-red-500 mb-4">{{ error }}</div>
            }
            <button class="w-full bg-purple-700 hover:bg-purple-800 text-white p-2 rounded font-semibold">
                Verify OTP
            </button>
        </form>
    }
    </div>
</div>
