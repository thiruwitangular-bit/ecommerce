<form #f="ngForm" class="max-w-4xl mx-auto px-6 my-10" (ngSubmit)="addproduct(f)">
    <!-- title and add button -->
    <div class="max-w-6xl mx-auto">
        <div class="flex items-center gap-6 flex-wrap border-b border-gray-300 pb-4">
            <div class="flex-1 text-nowrap">
                <h2 class="text-2xl font-semibold text-slate-900">Add Products</h2>
            </div>
        </div>
    </div>


    <!-- start form-->
    <div class="grid sm:grid-cols-2 gap-10 my-10">
        <div class="relative flex items-center">
            <label class="text-slate-900 text-[13px] font-medium absolute top-[-10px] left-0">Product Name</label>
            <input type="text" placeholder="Enter Product name" [(ngModel)]="product.name" name="name"
                class="px-2 pt-5 pb-2 pr-8 bg-white w-full text-sm border-b border-gray-300 focus:border-[#333] outline-none"
                required />
            <span class="material-icons text-gray-300">label</span>
        </div>

        <div class="relative flex items-center">
            <label class="text-slate-900 text-[13px] font-medium absolute top-[-10px] left-0">Product Category</label>
            <input type="text" placeholder="Enter Product name" [(ngModel)]="product.category" name="category"
                class="px-2 pt-5 pb-2 pr-8 bg-white w-full text-sm border-b border-gray-300 focus:border-[#333] outline-none"
                required />
            <span class="material-icons text-gray-300">label</span>
        </div>

        <div class="relative flex items-center">
            <label class="text-slate-900 text-[13px] font-medium absolute top-[-10px] left-0">Description</label>
            <input type="text" placeholder="Enter Description" [(ngModel)]="product.description" name="description"
                class="px-2 pt-5 pb-2 pr-8 bg-white w-full text-sm border-b border-gray-300 focus:border-[#333] outline-none"
                required />
            <span class="material-icons text-gray-300">description</span>

        </div>

        <div class="relative flex items-center">
            <label class="text-slate-900 text-[13px] font-medium absolute top-[-10px] left-0">Price</label>
            <input type="number" placeholder="Enter Price" [(ngModel)]="product.price" name="price"
                class="px-2 pt-5 pb-2 pr-8 bg-white w-full text-sm border-b border-gray-300 focus:border-[#333] outline-none"
                required min="1" />
            <span class="material-icons text-gray-300">currency_rupee</span>

        </div>

        <div class="relative flex items-center">
            <label class="text-slate-900 text-[13px] font-medium absolute top-[-10px] left-0">Stock</label>
            <input type="number" placeholder="Enter Stock" [(ngModel)]="product.stock" name="stock"
                class="px-2 pt-5 pb-2 pr-8 bg-white w-full text-sm border-b border-gray-300 focus:border-[#333] outline-none"
                required min="0" />
            <span class="material-icons text-gray-300">inventory_2</span>
        </div>
        @if (imagePreview) {
        <img [src]="imagePreview" class="w-32 mt-2">
        }
        <div class="relative flex items-center sm:col-span-2">
            <input type="file" (change)="onFileSelected($event)" accept="image/*"
                class="w-full text-slate-500 font-medium text-sm bg-white border file:cursor-pointer cursor-pointer file:border-0 file:py-3 file:px-4 file:mr-4 file:bg-gray-100 file:hover:bg-gray-200 file:text-slate-500 rounded"
                required />
            <p class="text-xs text-slate-500 mt-2 ml-3">PNG, JPG SVG, WEBP, and GIF are Allowed.</p>
        </div>
    </div>

    <button type="submit" [disabled]="f.invalid || !selectedFile"
        class="mt-12 px-2 py-2.5 w-full rounded-sm text-sm font-medium bg-black hover:bg-[#222] text-white cursor-pointer disabled:bg-gray-400 disabled:cursor-not-allowed">Add</button>
</form>
