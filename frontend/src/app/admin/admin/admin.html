<div class="p-4">
    <div class="bg-white border-2 border-gray-200 w-full max-w-12xl">
        <ul class="flex divide-x-2 divide-gray-200">
            <!-- Add Product Tab -->
            <li (click)="activeTab = 'home'"
                [ngClass]="activeTab === 'home'? '!border-b-transparent text-blue-500': 'border-gray-300'"
                class="tab flex flex-col items-center justify-center font-medium border-b-2 w-full text-sm py-3 px-6 cursor-pointer">

                <span class="material-icons" [ngClass]="activeTab === 'home' ? 'text-blue-500' : 'text-gray-500'">
                    store
                </span>

                Add Product
            </li>
            <li (click)="activeTab = 'setting'"
                [ngClass]="activeTab === 'setting'? '!border-b-transparent text-blue-500': 'border-gray-300'"
                class="tab flex flex-col items-center justify-center font-medium border-b-2 w-full text-sm py-3 px-6 cursor-pointer">

                <span class="material-icons" [ngClass]="activeTab === 'setting' ? 'text-blue-500' : 'text-gray-500'">
                    grid_view
                </span>

                View Products
            </li>

              <li (click)="activeTab = 'orders'"
                [ngClass]="activeTab === 'orders'? '!border-b-transparent text-blue-500': 'border-gray-300'"
                class="tab flex flex-col items-center justify-center font-medium border-b-2 w-full text-sm py-3 px-6 cursor-pointer">

                <span class="material-icons" [ngClass]="activeTab === 'orders' ? 'text-blue-500' : 'text-gray-500'">
                    list
                </span>

                View Orders
            </li>

        </ul>
        @if (activeTab === 'home') {
        <app-add-product />
        }
        @if (activeTab === 'setting') {
        <app-view-products />
        }
        @if (activeTab === 'orders') {
        <app-view-orders  />
        }
    </div>
</div>
